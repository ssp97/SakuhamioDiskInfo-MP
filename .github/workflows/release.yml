name: Release

on:
  push:
    paths:
      - internal/**
      - cmd/cdi-mp/**
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, defaults to cdi-mp-<run-number>
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-amd64
            goos: windows
            goarch: amd64
            ext: .exe
          - target: windows-arm64
            goos: windows
            goarch: arm64
            ext: .exe
          - target: linux-amd64
            goos: linux
            goarch: amd64
            ext: ""
          - target: linux-arm64
            goos: linux
            goarch: arm64
            ext: ""
          - target: linux-arm
            goos: linux
            goarch: arm
            goarm: "7"
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/cdi-mp-${{ matrix.target }}${{ matrix.ext }}" ./cmd/cdi-mp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdi-mp-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          tag="${INPUT_TAG:-cdi-mp-${GITHUB_RUN_NUMBER}}"
          notes="Automated build from ${GITHUB_SHA}."

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* --target "$GITHUB_SHA" --title "$tag" --notes "$notes"
          fi
